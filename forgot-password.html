<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - OMS</title>
    <script src="auth.js"></script>
    <style>
        :root {
            --bg-main: #0b0f19;
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg-input: rgba(9, 13, 22, 0.6);
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-focus: #60a5fa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: radial-gradient(circle at 50% 0%, #1e293b 0%, #0b0f19 75%); color: var(--text-main); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .recovery-card { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(16px); width: 100%; max-width: 440px; border-radius: 20px; padding: 45px 35px; box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7); text-align: center; }
        h1 { font-size: 26px; margin-bottom: 8px; font-weight: 800; background: linear-gradient(135deg, #fff 30%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: var(--text-muted); font-size: 13.5px; margin-bottom: 25px; line-height: 1.5; }
        .form-group { text-align: left; margin-bottom: 22px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input { width: 100%; background-color: var(--bg-input); border: 1px solid var(--glass-border); color: var(--text-main); padding: 13px 16px; border-radius: 10px; font-size: 14px; outline: none; }
        .btn-submit { width: 100%; background-color: var(--accent-blue); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; margin-bottom: 20px; }
        .btn-submit:hover { background-color: #2563eb; }
        .back-link { font-size: 13.5px; }
        .back-link a { color: var(--border-focus); text-decoration: none; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="recovery-card">
        <h1>Recover Credentials</h1>
        <p>Provide your registered system email to dispatch a verification security reset token.</p>
        <form id="recoveryForm" onsubmit="dispatchResetToken(event)">
            <div class="form-group">
                <label>Account Email</label>
                <input type="email" id="recoveryEmail" required placeholder="name@org.com">
            </div>
            <button type="submit" class="btn-submit">Send Reset Token</button>
        </form>
        <div class="back-link">
            <a href="login.html">Back to Login Gateway</a>
        </div>
    </div>
    <script>
        preventBackNavigation();
        async function dispatchResetToken(e) {
            e.preventDefault();
            const email = document.getElementById("recoveryEmail").value.trim();
            
            const response = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            if (response.ok) {
                alert("If that email address exists in our database, a validation key has been successfully transmitted.");
                window.location.replace("login.html");
            } else {
                alert("Something went wrong processing your request. Please check entry parameters.");
            }
        }
    </script>
</body>
</html>
