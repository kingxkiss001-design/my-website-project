<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMS - Admin Dashboard</title>
    <script src="auth.js"></script>
    <style>
        :root {
            --bg-main: #0b0f19;
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg-input: rgba(9, 13, 22, 0.6);
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: radial-gradient(circle at 50% 0%, #1e293b 0%, #0b0f19 75%); color: var(--text-main); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 26px; font-weight: 700; }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
        .btn-action { background-color: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-logout { background-color: transparent; border: 1px solid #f87171; color: #f87171; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 20px; border-radius: 12px; }
        .stat-card p { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .stat-card h3 { font-size: 28px; margin-top: 8px; font-weight: 700; color: var(--accent-blue); }
        
        .filter-section { display: flex; gap: 15px; margin-bottom: 20px; }
        .filter-input { background-color: var(--bg-input); border: 1px solid var(--glass-border); color: var(--text-main); padding: 12px 15px; border-radius: 8px; font-size: 13px; outline: none; flex: 1; }
        .filter-input::placeholder { color: var(--text-muted); }
        .filter-input:focus { border-color: var(--accent-blue); }

        .table-container { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; overflow: hidden; padding: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { font-size: 12px; text-transform: uppercase; color: var(--text-muted); padding: 12px 16px; border-bottom: 1px solid var(--glass-border); }
        td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 12px; width: 350px; border: 1px solid var(--glass-border); }
        .modal-input { width: 100%; padding: 10px; margin-bottom: 15px; background: var(--bg-input); border: 1px solid var(--glass-border); color: white; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div>
                <h1>Organization Dashboard</h1>
                <p class="subtitle">Administrative Database Operations</p>
            </div>
            <div>
                <button class="btn-action" onclick="document.getElementById('addMemberModal').style.display='flex'">+ Add Member</button>
                <button class="btn-logout" onclick="performLogOut()">Logout</button>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-card">
                <p>Total Registered Personnel</p>
                <h3 id="totalCount">0</h3>
            </div>
            <div class="stat-card">
                <p>Active Verified Statuses</p>
                <h3 style="color: #34d399;">System Online</h3>
            </div>
        </div>

        <div class="filter-section">
            <input type="text" id="searchInput" class="filter-input" placeholder="Search by name or email..." oninput="applyFilters()">
            <select id="roleFilter" class="filter-input" onchange="applyFilters()">
                <option value="all">All Roles</option>
                <option value="admin">System Admin</option>
                <option value="Backend Developer">Backend Developer</option>
                <option value="Frontend Developer">Frontend Developer</option>
                <option value="Project Manager">Project Manager</option>
                <option value="UI/UX Designer">UI/UX Designer</option>
            </select>
            <select id="statusFilter" class="filter-input" onchange="applyFilters()">
                <option value="all">All Statuses</option>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Member Details</th>
                        <th>Assigned Project Role</th>
                        <th>Status</th>
                        <th>System Command</th>
                    </tr>
                </thead>
                <tbody id="membersTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="addMemberModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; color: white;">Add New Member</h2>
            <input type="text" id="newName" class="modal-input" placeholder="Full Name">
            <input type="email" id="newEmail" class="modal-input" placeholder="Email Address">
            <select id="newRole" class="modal-input">
                <option value="admin">System Admin</option>
                <option value="Backend Developer">Backend Developer</option>
                <option value="Frontend Developer">Frontend Developer</option>
                <option value="Project Manager">Project Manager</option>
                <option value="UI/UX Designer">UI/UX Designer</option>
            </select>
            <button class="btn-action" style="width: 100%; padding: 10px;" onclick="submitNewMember()">Submit</button>
            <button class="btn-logout" style="width: 100%; padding: 10px; margin-top: 10px; border: none;" onclick="document.getElementById('addMemberModal').style.display='none'">Cancel</button>
        </div>
    </div>

    <div id="editMemberModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; color: white;">Edit Member Details</h2>
            <input type="hidden" id="editOriginalEmail">
            <input type="text" id="editName" class="modal-input" placeholder="Full Name">
            <input type="email" id="editEmail" class="modal-input" placeholder="Email Address">
            <select id="editRole" class="modal-input">
                <option value="admin">System Admin</option>
                <option value="Backend Developer">Backend Developer</option>
                <option value="Frontend Developer">Frontend Developer</option>
                <option value="Project Manager">Project Manager</option>
                <option value="UI/UX Designer">UI/UX Designer</option>
            </select>
            <button class="btn-action" style="width: 100%; padding: 10px;" onclick="submitEditMember()">Save Changes</button>
            <button class="btn-logout" style="width: 100%; padding: 10px; margin-top: 10px; border: none;" onclick="document.getElementById('editMemberModal').style.display='none'">Cancel</button>
        </div>
    </div>

    <script>
        let globalMembersData = [];

        async function fetchAndRenderMembers() {
            try {
                const response = await fetch('/api/members');
                globalMembersData = await response.json();
                document.getElementById("totalCount").innerText = globalMembersData.length;
                applyFilters();
            } catch (err) { console.error(err); }
        }

        function applyFilters() {
            const searchText = document.getElementById("searchInput").value.toLowerCase();
            const roleFilter = document.getElementById("roleFilter").value;
            const statusFilter = document.getElementById("statusFilter").value;

            const filteredData = globalMembersData.filter(user => {
                const status = user.status || 'Active';
                const matchesSearch = user.name.toLowerCase().includes(searchText) || user.email.toLowerCase().includes(searchText);
                const matchesRole = roleFilter === 'all' || user.role === roleFilter;
                const matchesStatus = statusFilter === 'all' || status === statusFilter;
                return matchesSearch && matchesRole && matchesStatus;
            });
            renderTable(filteredData);
        }

        function renderTable(dataToRender) {
            const tableBody = document.getElementById("membersTableBody");
            tableBody.innerHTML = "";
            
            dataToRender.forEach(user => {
                const status = user.status || 'Active';
                const tagStyle = status === 'Active' ? 'color: #10b981;' : 'color: #f87171;';
                
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td><strong>${user.name}</strong><br><small style="color:var(--text-muted)">${user.email}</small></td>
                    <td>${user.role}</td>
                    <td style="${tagStyle} font-weight:600;">
                        <select onchange="updateStatus('${user.email}', this.value)" style="background:transparent; color:inherit; border:none; cursor:pointer;">
                            <option value="Active" ${status === 'Active' ? 'selected' : ''}>Active</option>
                            <option value="Inactive" ${status === 'Inactive' ? 'selected' : ''}>Inactive</option>
                        </select>
                    </td>
                    <td>
                        <button onclick="openEditModal('${user.email}', '${user.name}', '${user.role}')" style="background:none; border:1px solid #3b82f6; color:#3b82f6; padding:5px 10px; border-radius:4px; cursor:pointer;">Edit</button>
                        <button onclick="removeUser('${user.email}')" style="background:none; border:1px solid #f87171; color:#f87171; padding:5px 10px; border-radius:4px; cursor:pointer;">Remove</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function openEditModal(email, name, role) {
            document.getElementById('editOriginalEmail').value = email;
            document.getElementById('editName').value = name;
            document.getElementById('editEmail').value = email;
            document.getElementById('editRole').value = role;
            document.getElementById('editMemberModal').style.display = 'flex';
        }

        async function submitEditMember() {
            const originalEmail = document.getElementById('editOriginalEmail').value;
            const body = { 
                originalEmail: originalEmail, 
                name: document.getElementById('editName').value, 
                email: document.getElementById('editEmail').value, 
                role: document.getElementById('editRole').value 
            };
            await fetch('/api/members/edit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            document.getElementById('editMemberModal').style.display = 'none';
            fetchAndRenderMembers();
        }

        async function removeUser(email) {
            if (!confirm("Are you sure?")) return;
            await fetch(`/api/members/${encodeURIComponent(email)}`, { method: 'DELETE' });
            fetchAndRenderMembers();
        }

        async function updateStatus(email, status) {
            await fetch('/api/members/status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, status })
            });
            fetchAndRenderMembers();
        }

        async function submitNewMember() {
            const body = { 
                name: document.getElementById("newName").value, 
                email: document.getElementById("newEmail").value, 
                role: document.getElementById("newRole").value 
            };
            await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            document.getElementById('addMemberModal').style.display = 'none';
            fetchAndRenderMembers();
        }

        function performLogOut() { localStorage.clear(); window.location.replace("login.html"); }
        
        fetchAndRenderMembers();
    </script>
</body>
</html>
